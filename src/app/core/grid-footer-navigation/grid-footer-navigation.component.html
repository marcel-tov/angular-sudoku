<div class="grid-footer-navigation">
  <button
    class="grid-footer-navigation__button"
    mat-raised-button
    [color]="hasSelectedValue() && !showNominees() ? 'primary' : undefined"
    type="button"
    [disabled]="!hasSelectedValue()"
    (click)="deleteValue.emit()"
    aria-label="Delete a selected value"
  >Delete number</button>

  <button
    class="grid-footer-navigation__button"
    mat-raised-button
    [color]="showNominees() ? 'primary' : undefined"
    type="button"
    (click)="nomineeToggle.emit()"
    aria-label="Toggle field edit nominees"
  >Nominees</button>

  <mat-slide-toggle
    color="primary"
    [checked]="isHelpEnabled()"
    (change)="helpChange.emit($event.checked)"
    aria-label="Enable help"
  >Help</mat-slide-toggle>
</div>

<div class="grid-footer-navigation">
  <nominee-values
    (onSelectValue)="selectValue.emit($event)"
  ></nominee-values>
</div>
